<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Checkout</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">IST Conferences</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#checkoutNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="checkoutNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="tickets.html">Tickets</a></li>
        <li class="nav-item"><a class="nav-link" href="signup.html">Sign Up</a></li>
      </ul>

      <a href="checkout.html" class="btn btn-outline-dark position-relative ms-3 cart-link">
        <i class="bi bi-cart3"></i>
        <span class="ms-1">Cart</span>
        <span id="cartCount" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
      </a>
    </div>
  </div>
</nav>

<div class="container my-4">
  <div class="row g-4">
    <div class="col-lg-8">
      <div class="card p-4">
        <h2 class="mb-3">Shopping Cart</h2>
        <p class="text-muted">Review and remove ticket products.</p>

        <div id="cartItems"></div>

        <div class="d-flex gap-2 mt-3 flex-wrap">
          <button id="clearCartBtn" class="btn btn-outline-danger">Clear Cart</button>
          <a href="tickets.html" class="btn btn-outline-secondary">Continue Shopping</a>
        </div>
      </div>
    </div>

    <div class="col-lg-4">
      <div class="card p-4">
        <h3 class="mb-3">Order Summary</h3>
        <div id="summaryArea"></div>
      </div>
    </div>
  </div>
</div>

<footer>
  <a href="#">Go to Top</a>
  <a href="index.html" style="margin-left: 8px;">Home Page</a>
  <a href="tickets.html" style="margin-left: 8px;">Tickets</a>
</footer>

<script>
  function getCart() {
    return JSON.parse(localStorage.getItem("cart")) || [];
  }

  function saveCart(cart) {
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
    renderSummary();
    updateCartCount();
  }

  function updateCartCount() {
    const cart = getCart();
    const count = cart.reduce((sum, item) => sum + item.quantity, 0);
    const cartCount = document.getElementById("cartCount");
    if (cartCount) {
      cartCount.textContent = count;
    }
  }

  function renderCart() {
    const cart = getCart();
    const cartItems = document.getElementById("cartItems");

    if (cart.length === 0) {
      cartItems.innerHTML = `<p><strong>Your cart is empty.</strong></p>`;
      return;
    }

    let html = `
      <div class="table-responsive">
        <table class="table align-middle">
          <thead>
            <tr>
              <th>Product</th>
              <th>City</th>
              <th>Price</th>
              <th>Qty</th>
              <th>Subtotal</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
    `;

    cart.forEach(item => {
      const subtotal = item.price * item.quantity;
      html += `
        <tr>
          <td>
            <strong>${item.title}</strong><br>
            <small class="text-muted">${item.info || ""}</small>
          </td>
          <td>${item.category}</td>
          <td>$${Number(item.price).toFixed(2)}</td>
          <td>${item.quantity}</td>
          <td>$${subtotal.toFixed(2)}</td>
          <td>
            <button class="btn btn-sm btn-outline-danger" onclick="removeItem('${item.id}')">Remove</button>
          </td>
        </tr>
      `;
    });

    html += `</tbody></table></div>`;
    cartItems.innerHTML = html;
  }

  function renderSummary() {
    const cart = getCart();
    const summaryArea = document.getElementById("summaryArea");

    if (cart.length === 0) {
      summaryArea.innerHTML = "<p>No items in cart.</p>";
      return;
    }

    const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
    const itemCount = cart.reduce((sum, item) => sum + item.quantity, 0);

    summaryArea.innerHTML = `
      <p><strong>Items:</strong> ${itemCount}</p>
      <p><strong>Total:</strong> $${total.toFixed(2)}</p>
      <button class="btn btn-success w-100" disabled>Proceed to Payment</button>
      <p class="small text-muted mt-2 mb-0">This button is disabled since this is one part of the project and not intended for anyone to actually pay for the tickets.</p>
    `;
  }

  function removeItem(id) {
    let cart = getCart();
    cart = cart.filter(item => item.id !== id);
    saveCart(cart);
  }

  document.getElementById("clearCartBtn").addEventListener("click", function () {
    saveCart([]);
  });

  updateCartCount();
  renderCart();
  renderSummary();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
