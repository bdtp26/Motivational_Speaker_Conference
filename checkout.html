<!-- Brian Tucker, Jamie Capone, Ivory Cathey -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Checkout</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="styles.css">
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
  <script type="module" src="app.js"></script>
</head>
<body class="bg-light" ng-app="conferenceApp" ng-controller="CheckoutController">

<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">IST Conferences</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#checkoutNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="checkoutNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="tickets.html">Tickets</a></li>
        <li class="nav-item"><a class="nav-link" href="signup.html">Sign Up</a></li>
        <li class="nav-item"><a class="nav-link" href="returns.html">Returns</a></li>
      </ul>

      <a href="checkout.html" class="btn btn-outline-dark position-relative ms-3 cart-link">
        <i class="bi bi-cart3"></i>
        <span class="ms-1">Cart</span>
        <span id="cartCount" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
      </a>
    </div>
  </div>
</nav>

<div class="container my-4">
  <div class="row g-4">
    <div class="col-lg-7">
      <div class="card p-4 mb-4">
        <h2 class="mb-3">Shopping Cart</h2>
        <p class="text-muted">Review and remove ticket products.</p>
        <div id="cartItems"></div>

        <div class="d-flex gap-2 mt-3 flex-wrap">
          <button id="clearCartBtn" class="btn btn-outline-danger" type="button">Clear Cart</button>
          <a href="tickets.html" class="btn btn-outline-secondary">Continue Shopping</a>
        </div>
      </div>

      <div class="card p-4">
        <h3 class="mb-3">Billing Details</h3>
        <form id="billingForm" novalidate>
          <div class="mb-3">
            <label for="billingName" class="form-label">Full Name</label>
            <input type="text" id="billingName" class="form-control" ng-model="billing.fullName" required>
          </div>

          <div class="mb-3">
            <label for="billingEmail" class="form-label">Email Address</label>
            <input type="email" id="billingEmail" class="form-control" ng-model="billing.email" required>
          </div>

          <div class="mb-3">
            <label for="billingPhone" class="form-label">Phone Number</label>
            <input type="tel" id="billingPhone" class="form-control" ng-model="billing.phone">
          </div>

          <div class="mb-3">
            <label for="billingAddress" class="form-label">Billing Address</label>
            <input type="text" id="billingAddress" class="form-control" ng-model="billing.address" required>
          </div>

          <div class="row">
            <div class="col-md-5 mb-3">
              <label for="billingCity" class="form-label">City</label>
              <input type="text" id="billingCity" class="form-control" ng-model="billing.city" required>
            </div>
            <div class="col-md-4 mb-3">
              <label for="billingState" class="form-label">State</label>
              <select id="billingState" class="form-select" ng-model="billing.state" required>
                <option value="">Select...</option>
                <option value="AL">Alabama</option>
                <option value="AK">Alaska</option>
                <option value="AZ">Arizona</option>
                <option value="AR">Arkansas</option>
                <option value="CA">California</option>
                <option value="CO">Colorado</option>
                <option value="CT">Connecticut</option>
                <option value="DE">Delaware</option>
                <option value="DC">District of Columbia</option>
                <option value="FL">Florida</option>
                <option value="GA">Georgia</option>
                <option value="HI">Hawaii</option>
                <option value="ID">Idaho</option>
                <option value="IL">Illinois</option>
                <option value="IN">Indiana</option>
                <option value="IA">Iowa</option>
                <option value="KS">Kansas</option>
                <option value="KY">Kentucky</option>
                <option value="LA">Louisiana</option>
                <option value="ME">Maine</option>
                <option value="MD">Maryland</option>
                <option value="MA">Massachusetts</option>
                <option value="MI">Michigan</option>
                <option value="MN">Minnesota</option>
                <option value="MS">Mississippi</option>
                <option value="MO">Missouri</option>
                <option value="MT">Montana</option>
                <option value="NE">Nebraska</option>
                <option value="NV">Nevada</option>
                <option value="NH">New Hampshire</option>
                <option value="NJ">New Jersey</option>
                <option value="NM">New Mexico</option>
                <option value="NY">New York</option>
                <option value="NC">North Carolina</option>
                <option value="ND">North Dakota</option>
                <option value="OH">Ohio</option>
                <option value="OK">Oklahoma</option>
                <option value="OR">Oregon</option>
                <option value="PA">Pennsylvania</option>
                <option value="RI">Rhode Island</option>
                <option value="SC">South Carolina</option>
                <option value="SD">South Dakota</option>
                <option value="TN">Tennessee</option>
                <option value="TX">Texas</option>
                <option value="UT">Utah</option>
                <option value="VT">Vermont</option>
                <option value="VA">Virginia</option>
                <option value="WA">Washington</option>
                <option value="WV">West Virginia</option>
                <option value="WI">Wisconsin</option>
                <option value="WY">Wyoming</option>
              </select>
            </div>
            <div class="col-md-3 mb-3">
              <label for="billingZip" class="form-label">Zip Code</label>
              <input type="text" id="billingZip" class="form-control" ng-model="billing.zip" required>
            </div>
          </div>

          <div class="mb-3">
            <label for="cardType" class="form-label">Card Type</label>
            <input type="text" id="cardType" class="form-control" ng-model="billing.cardType" placeholder="Visa, Mastercard, etc." required>
          </div>

          <div class="mb-3">
            <label for="cardNumber" class="form-label">Card Number</label>
            <input type="text" id="cardNumber" class="form-control" ng-model="billing.cardNumber" maxlength="19" required>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="cardExp" class="form-label">Expiration Date</label>
              <input type="month" id="cardExp" class="form-control" ng-model="billing.cardExp" required>
            </div>
            <div class="col-md-6 mb-3">
              <label for="cardCode" class="form-label">Security Code</label>
              <input type="text" id="cardCode" class="form-control" ng-model="billing.code" maxlength="4" required>
            </div>
          </div>

          <button type="submit" class="btn btn-success">Submit Billing Details</button>
        </form>
      </div>
    </div>

    <div class="col-lg-5">
      <div class="card p-4 mb-4">
        <h3 class="mb-3">Order Summary</h3>
        <div id="summaryArea"></div>
      </div>

      <div class="card p-3 mb-4">
        <h4>Billing JSON</h4>
        <pre id="billingJsonOut">{{ billingJsonPreview }}</pre>
      </div>

      <div class="card p-3">
        <h4>AJAX / AngularJS Status</h4>
        <p id="billingAjaxStatus" class="mb-0">{{ billingAjaxStatus }}</p>
      </div>
    </div>
  </div>
</div>

<footer>
  <a href="#">Go to Top</a>
  <a href="index.html" style="margin-left: 8px;">Home Page</a>
  <a href="tickets.html" style="margin-left: 8px;">Tickets</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
